name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run static sanity checks
        run: |
          python -m compileall -q .

      - name: Run smoke test
        run: |
          python - <<'PY'
          from env.environment import CodeFixEnv

          env = CodeFixEnv()
          state = env.reset("easy")
          assert isinstance(state, dict), "reset() must return a dict state"

          obs, reward, done, info = env.step("fix_syntax")
          assert isinstance(obs, dict), "step() observation must be a dict"
          assert isinstance(done, bool), "step() done must be bool"
          print("Smoke test passed")
          PY

      - name: Run tests if present
        run: |
          if [ -n "$(find tests -name 'test_*.py' -print -quit)" ]; then
            pytest -q
          else
            echo "No tests found. Skipping pytest."
          fi
